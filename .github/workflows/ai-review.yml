name: AI review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  request-copilot:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Add Copilot as reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr edit "$PR" --repo "$REPO" --add-reviewer Copilot || true

  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - id: creds
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [[ -n "$OAUTH" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No CLAUDE_CODE_OAUTH_TOKEN secret; skipping Claude review"
          fi
      - uses: actions/checkout@v4
        if: steps.creds.outputs.ok == 'true'
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@beta
        if: steps.creds.outputs.ok == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review this PR. Focus on correctness, security risks, design
            coherence with surrounding code, and unresolved TODOs. Post
            concise line comments where useful.
