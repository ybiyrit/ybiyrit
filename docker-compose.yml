version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped
    networks:
      - carbon-calc

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - carbon-calc

networks:
  carbon-calc:
    driver: bridge

volumes:
  data:
